*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a3a5c;--primary-light:#e8eef5;--accent:#c8a45a;--accent-light:#faf3e0;--success:#16a34a;--success-light:#dcfce7;--warning:#d97706;--warning-light:#fef3c7;--danger:#dc2626;--danger-light:#fee2e2;--info:#0284c7;--info-light:#e0f2fe;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;--r:8px;--sh:0 1px 3px rgba(0,0,0,.1);--shm:0 4px 6px -1px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--g50);color:var(--g800);line-height:1.6}
.header{background:var(--primary);color:#fff;padding:14px 28px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}

.header h1 span{color:var(--accent);font-weight:700}
.search-box{display:flex;align-items:center;background:rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;width:320px}
.search-box input{background:none;border:none;color:#fff;outline:none;width:100%;font-size:14px}
.search-box input::placeholder{color:rgba(255,255,255,.6)}
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:260px;min-width:260px;background:#fff;border-right:1px solid var(--g200);overflow-y:auto;padding:12px 0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--g300);border-radius:2px}
.nav-section{padding:6px 16px;font-size:11px;color:var(--g400);text-transform:uppercase;letter-spacing:1px;margin-top:8px}
.nav-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;font-size:14px;color:var(--g600);transition:all .15s;border-left:3px solid transparent;gap:10px}
.nav-item:hover{background:var(--primary-light);color:var(--primary)}
.nav-item.active{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary);font-weight:600}
.nav-icon{width:20px;text-align:center;font-size:16px}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
.main{flex:1;overflow-y:auto;padding:24px 32px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}
.page-title{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.page-desc{color:var(--g500);font-size:14px;margin-bottom:20px}
.progress-bar-wrap{background:var(--g200);border-radius:10px;height:8px;margin-bottom:20px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:10px;transition:width .4s}
.progress-text{font-size:12px;color:var(--g500);margin-bottom:16px;text-align:right}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;border:1px solid var(--g200);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shm)}
.card-header{display:flex;align-items:center;padding:14px 18px;cursor:pointer;gap:12px;user-select:none}
.card-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.card-status.done{background:var(--success)}
.card-status.pending{background:var(--g300)}
.card-status.progress{background:var(--warning)}
.card-title{font-size:15px;font-weight:600;color:var(--g800);flex:1}
.card-toggle{color:var(--g400);font-size:18px;transition:transform .2s}
.card-toggle.open{transform:rotate(180deg)}
.card-body{display:none;padding:0 18px 16px;border-top:1px solid var(--g100)}
.card-body.show{display:block}
.tabs{display:flex;border-bottom:1px solid var(--g200);margin:12px 0 0}
.tab{padding:8px 16px;font-size:13px;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-content{display:none;padding-top:14px}
.tab-content.show{display:block}
.step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--g100)}
.step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-content{flex:1}
.step-title{font-weight:600;font-size:14px;color:var(--g800)}
.step-desc{font-size:13px;color:var(--g600);margin-top:2px}
.contact-card{display:inline-flex;align-items:center;gap:8px;background:var(--primary-light);padding:8px 14px;border-radius:var(--r);margin:4px 4px 4px 0;font-size:13px}
.contact-name{font-weight:600;color:var(--primary)}
.contact-role{color:var(--g500);font-size:12px}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500;margin:2px}
.tag-warn{background:var(--warning-light);color:var(--warning)}
.tag-info{background:var(--info-light);color:var(--info)}
.tag-ok{background:var(--success-light);color:var(--success)}
.tag-danger{background:var(--danger-light);color:var(--danger)}
.tip-box{padding:12px 16px;border-radius:var(--r);margin:10px 0;font-size:13px;line-height:1.7}
.tip-warn{background:var(--warning-light);border-left:3px solid var(--warning)}
.tip-info{background:var(--info-light);border-left:3px solid var(--info)}
.tip-ok{background:var(--success-light);border-left:3px solid var(--success)}
.tip-danger{background:var(--danger-light);border-left:3px solid var(--danger)}
.checklist{list-style:none;padding:0}
.checklist li{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--g100)}
.checklist li:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border:2px solid var(--g300);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-box.checked{background:var(--success);border-color:var(--success);color:#fff}
.check-box.checked::after{content:"✓";font-size:12px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:"";position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--g200)}
.tl-item{position:relative;padding:8px 0 16px}
.tl-dot{position:absolute;left:-20px;top:12px;width:12px;height:12px;border-radius:50%;background:var(--primary);border:2px solid #fff;box-shadow:0 0 0 2px var(--primary)}
.tl-title{font-weight:600;font-size:14px}
.tl-desc{font-size:13px;color:var(--g600);margin-top:2px}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin:10px 0}
.company-item{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:10px 14px}
.company-name{font-weight:700;font-size:14px;color:var(--primary);margin-bottom:4px}
.company-detail{font-size:12px;color:var(--g600);line-height:1.6}
.overview-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh);border:1px solid var(--g200)}
.stat-num{font-size:28px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--g500);margin-top:4px}
.flow-steps{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin:12px 0}
.flow-step{background:var(--primary-light);color:var(--primary);padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;position:relative}
.flow-arrow{color:var(--g400);font-size:18px}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.data-table th{background:var(--primary);color:#fff;padding:8px 12px;text-align:left;font-weight:600}
.data-table td{padding:8px 12px;border-bottom:1px solid var(--g200)}
.data-table tr:hover td{background:var(--g50)}
.section-divider{height:1px;background:var(--g200);margin:16px 0}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;min-width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--g200)}.main{padding:16px}.overview-stats{grid-template-columns:repeat(2,1fr)}.search-box{width:200px}}
</style>
</head>

let currentModule = 'overview';
let checkState = {};

function init(){
  try{ checkState = JSON.parse(localStorage.getItem('zuu_checks')||'{}'); }catch(e){ checkState={}; }
  showModule('overview');
}

function saveChecks(){
  try{ localStorage.setItem('zuu_checks', JSON.stringify(checkState)); }catch(e){}
}

function showModule(key){
  currentModule = key;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.getAttribute('onclick')&&n.getAttribute('onclick').includes("'"+key+"'")) n.classList.add('active');
  });
  const mod = DATA[key];
  if(!mod) return;
  let h = `<div class="page-title">${mod.title}</div><div class="page-desc">${mod.desc}</div>`;
  if(mod.cards){
    let total=0,done=0;
    mod.cards.forEach(c=>{
      const allChecks=[];
      Object.values(c.tabs).forEach(html=>{
        const m=html.match(/data-id="([^"]+)"/g);
        if(m) m.forEach(x=>allChecks.push(x.match(/"([^"]+)"/)[1]));
      });
      total+=Math.max(allChecks.length,1);
      const doneCount=allChecks.filter(id=>checkState[id]).length;
      if(allChecks.length>0&&doneCount===allChecks.length) done+=allChecks.length;
      else done+=doneCount;
    });
    const pct=total>0?Math.round(done/total*100):0;
    h+=`<div class="progress-text">${done}/${total} 已完成 (${pct}%)</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
    mod.cards.forEach(c=>{
      const tabKeys=Object.keys(c.tabs);
      const statusClass=getCardStatus(c);
      h+=`<div class="card"><div class="card-header" onclick="toggleCard(this)">
        <div class="card-status ${statusClass}"></div>
        <div class="card-title">${c.title}</div>
        <div class="card-toggle">▼</div></div>
        <div class="card-body"><div class="tabs">`;
      tabKeys.forEach((t,i)=>{ h+=`<div class="tab${i===0?' active':''}" onclick="switchTab(this,'${c.id}',${i})">${t}</div>`; });
      h+=`</div>`;
      tabKeys.forEach((t,i)=>{ h+=`<div class="tab-content${i===0?' show':''}" data-card="${c.id}" data-idx="${i}">${c.tabs[t]}</div>`; });
      h+=`</div></div>`;
    });
  } else if(mod.html){
    h+=mod.html;
  }
  document.getElementById('mainContent').innerHTML=h;
  bindCheckboxes();
  if(key==='overview') updateOverviewStats();
}

function getCardStatus(card){
  const ids=[];
  Object.values(card.tabs).forEach(html=>{
    const m=html.match(/data-id="([^"]+)"/g);
    if(m) m.forEach(x=>ids.push(x.match(/"([^"]+)"/)[1]));
  });
  if(ids.length===0) return checkState[card.id+'_done']?'done':'pending';
  const doneCount=ids.filter(id=>checkState[id]).length;
  if(doneCount===ids.length) return 'done';
  if(doneCount>0) return 'progress';
  return 'pending';
}

function toggleCard(el){
  const body=el.nextElementSibling;
  const toggle=el.querySelector('.card-toggle');
  body.classList.toggle('show');
  toggle.classList.toggle('open');
}

function switchTab(el,cardId,idx){
  el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll(`.tab-content[data-card="${cardId}"]`).forEach((tc,i)=>{
    tc.classList.toggle('show',i===idx);
  });
}

function bindCheckboxes(){
  document.querySelectorAll('.check-box').forEach(cb=>{
    const id=cb.getAttribute('data-id');
    if(id && checkState[id]) cb.classList.add('checked');
    cb.onclick=function(){
      const cid=this.getAttribute('data-id');
      if(!cid) return;
      checkState[cid]=!checkState[cid];
      this.classList.toggle('checked');
      saveChecks();
      updateModuleProgress();
    };
  });
}

function updateModuleProgress(){
  const mod=DATA[currentModule];
  if(!mod||!mod.cards) return;
  let total=0,done=0;
  mod.cards.forEach(c=>{
    const ids=[];
    Object.values(c.tabs).forEach(html=>{
      const m=html.match(/data-id="([^"]+)"/g);
      if(m) m.forEach(x=>ids.push(x.match(/"([^"]+)"/)[1]));
    });
    total+=Math.max(ids.length,1);
    done+=ids.filter(id=>checkState[id]).length;
  });
  const pct=total>0?Math.round(done/total*100):0;
  const pt=document.querySelector('.progress-text');
  const pf=document.querySelector('.progress-bar-fill');
  if(pt) pt.textContent=`${done}/${total} 已完成 (${pct}%)`;
  if(pf) pf.style.width=pct+'%';
  // Update card statuses
  document.querySelectorAll('.card').forEach((card,i)=>{
    if(mod.cards[i]){
      const dot=card.querySelector('.card-status');
      if(dot) dot.className='card-status '+getCardStatus(mod.cards[i]);
    }
  });
}

function updateOverviewStats(){
  let total=0,done=0;
  Object.keys(DATA).forEach(key=>{
    const mod=DATA[key];
    if(!mod.cards) return;
    mod.cards.forEach(c=>{
      const ids=[];
      Object.values(c.tabs).forEach(html=>{
        const m=html.match(/data-id="([^"]+)"/g);
        if(m) m.forEach(x=>ids.push(x.match(/"([^"]+)"/)[1]));
      });
      total+=Math.max(ids.length,1);
      done+=ids.filter(id=>checkState[id]).length;
    });
  });
  const el=id=>document.getElementById(id);
  if(el('statTotal')) el('statTotal').textContent=total;
  if(el('statDone')) el('statDone').textContent=done;
  if(el('statPending')) el('statPending').textContent=total-done;
  if(el('statPct')) el('statPct').textContent=total>0?Math.round(done/total*100)+'%':'0%';
}

function handleSearch(query){
  if(!query.trim()){showModule(currentModule);return;}
  const q=query.toLowerCase();
  let results=[];
  Object.keys(DATA).forEach(key=>{
    const mod=DATA[key];
    if(mod.cards){
      mod.cards.forEach(c=>{
        let match=false;
        if(c.title.toLowerCase().includes(q)) match=true;
        Object.values(c.tabs).forEach(html=>{
          if(html.toLowerCase().includes(q)) match=true;
        });
        if(match) results.push({module:key,moduleTitle:mod.title,card:c});
      });
    }
    if(mod.html&&mod.html.toLowerCase().includes(q)){
      results.push({module:key,moduleTitle:mod.title,card:{title:'总览',tabs:{}}});
    }
  });
  let h=`<div class="page-title">🔍 搜索结果</div><div class="page-desc">找到 ${results.length} 个匹配项（关键词："${query}"）</div>`;
  if(results.length===0){
    h+=`<div class="tip-box tip-warn">未找到相关内容，请尝试其他关键词。</div>`;
  } else {
    results.forEach(r=>{
      h+=`<div class="card"><div class="card-header" onclick="showModule('${r.module}')" style="cursor:pointer">
        <div class="card-status pending"></div>
        <div class="card-title">${r.moduleTitle} → ${r.card.title}</div>
        <div style="color:var(--info);font-size:13px">点击查看 →</div></div></div>`;
    });
  }
  document.getElementById('mainContent').innerHTML=h;
}

init();
</script>
</body>
</html>
